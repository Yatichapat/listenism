services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-listenism}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-listenism}
      POSTGRES_DB: ${POSTGRES_DB:-listenism_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-listenism} -d ${POSTGRES_DB:-listenism_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data

  ml:
    build:
      context: ./ml
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MODEL_PATH: /app/models/cf_model.pkl
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-listenism}:${POSTGRES_PASSWORD:-listenism}@postgres:5432/${POSTGRES_DB:-listenism_db}
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8001"]

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-listenism}:${POSTGRES_PASSWORD:-listenism}@postgres:5432/${POSTGRES_DB:-listenism_db}
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: http://localhost:8080/storage
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${MINIO_BUCKET:-listenism-audio}
      ML_SERVICE_URL: http://ml:8001
      ADMIN_BOOTSTRAP_ENABLED: ${ADMIN_BOOTSTRAP_ENABLED:-true}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@listenism.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_DISPLAY_NAME: ${ADMIN_DISPLAY_NAME:-Listenism Admin}
      ADMIN_RESET_PASSWORD: ${ADMIN_RESET_PASSWORD:-false}
    command: ["sh", "-c", "alembic upgrade head && python -m app.scripts.bootstrap_admin && uvicorn app.main:app --host 0.0.0.0 --port 8000"]

  gateway:
    build:
      context: ./gateway
    restart: unless-stopped
    depends_on:
      - backend
      - ml
    ports:
      - "8080:80"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    restart: unless-stopped
    depends_on:
      - gateway
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      INTERNAL_API_URL: http://gateway
    ports:
      - "3000:3000"
    command: ["npm", "run", "start"]

volumes:
  postgres_data:
  redis_data:
  minio_data:
