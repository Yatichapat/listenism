limit_req_zone $binary_remote_addr zone=api_rate:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=per_ip_conn:10m;

# Sets $auth_valid to 1 when Authorization has Bearer token format.
map $http_authorization $auth_valid {
    default 0;
    "~^Bearer\s+.+$" 1;
}

# Public API routes that do not require auth at the gateway.
map $request_uri $public_endpoint {
    default 0;
    "~^/api/v1/auth/register$" 1;
    "~^/api/v1/auth/login$" 1;
    "~^/api/v1/auth/refresh$" 1;
    "~^/api/v1/music/songs$" 1;
    "~^/api/v1/music/songs/newest(?:\?.*)?$" 1;
    "~^/api/v1/music/songs/hot(?:\?.*)?$" 1;
    "~^/api/v1/music/albums/newest(?:\?.*)?$" 1;
    "~^/api/v1/music/albums/[0-9]+(?:\?.*)?$" 1;
    "~^/api/v1/music/artists/hot(?:\?.*)?$" 1;
    "~^/api/v1/music/artists/newest(?:\?.*)?$" 1;
    "~^/api/v1/music/search(?:\?.*)?$" 1;
    "~^/api/v1/social/comments(?:\?.*)?$" 1;
}

# Fail only for non-public API routes without Bearer auth.
# OPTIONS is always allowed so backend CORS middleware can respond.
map "$request_method:$public_endpoint:$auth_valid" $early_auth_check {
    default 0;
    "OPTIONS:0:0" 0;
    "OPTIONS:0:1" 0;
    "OPTIONS:1:0" 0;
    "OPTIONS:1:1" 0;
    "~^[^:]+:0:0$" 1;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 100m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy no-referrer-when-downgrade always;

    # Basic request throttling and connection caps per IP.
    limit_req zone=api_rate burst=40 nodelay;
    limit_conn per_ip_conn 30;

    # Forward backend API routes with early Bearer header enforcement.
    location /api/ {
        if ($early_auth_check = 1) {
            return 401;
        }

        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Backend health and docs.
    location = /health {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
    }

    location /docs {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
    }

    location /openapi.json {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
    }

    # Optional ML proxy under /ml/* -> ml service root.
    location /ml/ {
        rewrite ^/ml/?(.*)$ /$1 break;
        proxy_pass http://ml:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Public media access via gateway -> MinIO object API.
    location /storage/ {
        rewrite ^/storage/(.*)$ /$1 break;
        proxy_pass http://minio:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location / {
        return 404;
    }

    error_page 401 =401 @auth_error;
    location @auth_error {
        default_type application/json;
        return 401 '{"detail":"Not authenticated"}';
    }
}
